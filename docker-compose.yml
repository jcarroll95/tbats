services:
  postgres:
    image: postgres:16
    container_name: tbats-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in local.env}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in local.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in local.env}
    ports:
      - "5433:5432"
    volumes:
      - tbats-data:/var/lib/postgresql/data

  app:
    build:
      context: .
    container_name: tbats-app
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "8080:8080"

volumes:
  tbats-data: